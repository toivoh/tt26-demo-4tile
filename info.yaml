# Tiny Tapeout project information
project:
  title:        "Four tile demo [TTSKY26a demo competition]"      # Project title
  author:       "Toivo Henningsson"      # Your name
  discord:      "possible_realities"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Four tile demo for to the TTSKY26a demo competition"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50400000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
#  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_toivoh_demo_4tile"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project_pl.v"
#    - "project.v"
#    - "alt_project.v"
#    - "subdivider_pl.sv"
#    - "subdiv_test.sv"
    - "trace_state.sv"
    - "subdet.sv"
#    - "subdiv_tracer.sv"
    - "interval_buffer.sv"
    - "interval_buffer2.sv"
#    - "buffered_tracer.sv"
    - "raster_scan.sv"
#    - "vga_tracer.sv"
#    - "multiplier.sv"
#    - "view_calc.sv"
    - "jumper.sv"

    - "subdivider_pl.sv"
    - "subdiv_pl_tracer.sv"
    - "buffered_pl_tracer.sv"
    - "vga_pl_tracer.sv"
    - "memories.sv"
#    - "scene.sv"
    - "scene1.sv"
    - "trace_state_rs.sv"
    - "matrix_calc_pl.sv"
    - "view_calc_pl.sv"
    - "room_navigator.sv"
    - "synth_test.sv"
    - "music_player.sv"
    - "music_player_wrapper.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "speedup[0]"
  ui[1]: "speedup[1]"
  ui[2]: "speedup[2]"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "vsync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "hsync"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: "audio_out"

